about:
  content: >
    # About Tools For You
    
    Tools For You is developed with ❤ by [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about).
    
    It regroups useful tools for developer and people working in IT.
    
    If you find it helpful, please share it to your friends and add it to your bookmarks!
    
    Tools For You is free and open-source (GPL-3.0 license), but requires funding for hosting and domain name renewal.
    
    If you want to support my work, and encourage me to add more tools, please consider sponsoring me on [Buy me a coffee](https://www.buymeacoffee.com/cthmsst).
    
    ## Tech stack
    
    Tools For You is made with Vue.js (Vue 3) and the Naive UI component library, and is hosted and deployed by Vercel.
    
    Some tools use third-party open-source libraries. You can find the complete list in the [package.json](https://github.com/sgj-king/tools-for-you/blob/main/package.json) file of the repository.
    
    ## Found a bug? Missing a tool?
    
    If the tool you need is not here and you think it could be useful, you are welcome to submit a feature request in the [issues](https://github.com/sgj-king/tools-for-you/issues/new/choose) of the GitHub repository.
    
    If you found a bug or something is not working as expected, you are welcome to submit a bug report in the [issues](https://github.com/sgj-king/tools-for-you/issues/new/choose) of the GitHub repository.

