about:
  content: >
    # 关于 Tools For You
    
    Tools For You 由 [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) 用 ❤ 开发，汇集了对开发人员和 IT 从业者有用的工具。
    
    如果对您有帮助，请将其分享给您的朋友，并且添加到收藏夹中！
    
    Tools For You 永久免费且开源（GPL-3.0 许可证），但需要资金用于托管和续订域名。如果您想支持我的工作，并鼓励我添加更多工具，请考虑通过 [赞助我](https://www.buymeacoffee.com/cthmsst) 进行支持。
    
    ## 技术
    
    Tools For You 采用 Vue.js（Vue 3）和 Naive UI 组件库开发，并由 Vercel 托管和持续部署。
    
    某些工具使用了第三方开源库，您可以在仓库的 [package.json](https://github.com/sgj-king/tools-for-you/blob/main/package.json) 文件中找到完整的列表。
    
    ## 发现了 Bug？缺少工具？
    
    如果目前这里没有您需要的工具，并且您认为它可能有用，欢迎在 GitHub 仓库的 [issues](https://github.com/sgj-king/tools-for-you/issues/new/choose) 中提交新增功能的请求。
    
    如果您发现了 Bug，或者某些功能未能按预期工作，请在 GitHub 仓库的 [issues](https://github.com/sgj-king/tools-for-you/issues/new/choose) 中提交错误报告。

